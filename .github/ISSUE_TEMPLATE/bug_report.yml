name: 🐛 Bug 报告
description: 提交 Bug 以帮助我们改进
title: "[Bug]："
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        ## 感谢提交 Bug 报告！
        请尽可能详细地描述问题，以便我们快速定位和修复。

  - type: textarea
    id: description
    attributes:
      label: 问题描述
      description: 简洁清晰地描述这个 Bug 是什么
      placeholder: 当我执行 `novel write` 时...
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: 复现步骤
      description: 如何复现这个问题？
      placeholder: |
        1. 运行 `novel init test-novel`
        2. 创建角色文件 `characters/char_001.md`
        3. 执行 `novel write draft/ch_001.md`
        4. 看到错误
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 期望行为
      description: 你期望发生什么？
    validations:
      required: false

  - type: textarea
    id: actual
    attributes:
      label: 实际行为
      description: 实际发生了什么？请粘贴错误日志或截图
    validations:
      required: false

  - type: input
    id: version
    attributes:
      label: OpenNovel 版本
      description: 运行 `loom --version` 或查看 `pyproject.toml`
      placeholder: "1.0.1"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: 操作系统
      description: 你在什么系统上运行？
      options:
        - Windows
        - macOS
        - Linux
        - WSL
    validations:
      required: true

  - type: input
    id: python-version
    attributes:
      label: Python 版本
      placeholder: "3.10 / 3.11 / 3.12"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: 相关日志输出
      description: 请复制粘贴任何相关的日志输出
      render: shell
    validations:
      required: false

  - type: checkboxes
    id: checks
    attributes:
      label: 确认清单
      options:
        - label: 我已搜索现有 Issues，没有找到重复问题
          required: true
        - label: 我使用的是最新版本
          required: true
        - label: 我已提供完整的复现步骤和日志
          required: true
