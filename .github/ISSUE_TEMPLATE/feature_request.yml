name: ✨ 功能建议
description: 为 L.O.O.M. 提出一个新想法
title: "[Feature]："
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        ## 感谢你的建议！
        请描述你的想法和它解决的问题。

  - type: textarea
    id: problem
    attributes:
      label: 解决的问题
      description: 这个功能解决了什么问题？如果适用，描述当前工作流的痛点
      placeholder: 当我要...的时候，我需要手动...，这很繁琐
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 解决方案
      description: 你期望的解决方案是什么样的？
      placeholder: 希望 L.O.O.M. 能够自动...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案
      description: 你考虑过的替代方案或变通方法
    validations:
      required: false

  - type: dropdown
    id: scope
    attributes:
      label: 影响范围
      description: 这个功能会影响哪些层面？
      options:
        - CLI 交互
        - AI/LLM 集成
        - 存储/状态管理
        - 文档/解析
        - 核心架构
        - 其他
      multiple: true
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: 补充信息
      description: 截图、Mockup、参考项目等
    validations:
      required: false

  - type: checkboxes
    id: checks
    attributes:
      label: 确认清单
      options:
        - label: 我已搜索现有 Issues，没有重复建议
          required: true
        - label: 这个功能符合 L.O.O.M. 的设计理念（Human-first, AI-assist）
          required: true
